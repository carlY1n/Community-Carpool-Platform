[tool:pytest]
# pytest配置文件

# 测试发现
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 标记
markers =
    smoke: 冒烟测试 - 快速验证基本功能
    critical: 关键功能测试 - 核心业务流程
    regression: 回归测试 - 防止功能退化
    integration: 集成测试 - 多模块协作
    performance: 性能测试 - 响应时间和负载
    slow: 慢速测试 - 执行时间较长的测试

# 输出配置
addopts = 
    -v
    --strict-markers
    --strict-config
    --tb=short
    --maxfail=10
    --color=yes
    --durations=10

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 最小版本
minversion = 6.0

# 过滤警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:.*selenium.*:DeprecationWarning

# 超时设置
timeout = 300
timeout_method = thread

# HTML报告配置
html_theme = light 